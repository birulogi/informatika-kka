<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Auto Divide & Conquer - SMA KP Baleendah</title>
    <style>
        :root { --blue: #1a73e8; --dark: #202124; --success: #1e8e3e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f3f4; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 800px; text-align: center; }
        
        /* Grid Angka */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin: 20px 0; }
        .num { height: 40px; display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; transition: 0.3s; }
        
        /* Efek Visual */
        .active { background: var(--blue); color: white; transform: scale(1.1); z-index: 2; font-weight: bold; box-shadow: 0 0 10px var(--blue); }
        .discarded { background: #f8f9fa; color: #ccc; text-decoration: line-through; border-color: #eee; }
        .found { background: var(--success) !important; color: white !important; animation: bounce 0.5s; }

        .dashboard { display: flex; justify-content: space-around; background: var(--dark); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-family: 'Courier New', monospace; }
        .stat { text-align: center; }
        .stat span { display: block; color: var(--blue); font-size: 20px; font-weight: bold; }

        button { background: var(--blue); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
        
        @keyframes bounce { 0%, 100% { transform: scale(1.3); } 50% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--blue);">Simulasi Otomatis: Divide & Conquer</h2>
    <p>Komputer menentukan angka rahasia, lalu mencari jawabannya sendiri.</p>

    <div class="dashboard">
        <div class="stat">RAHASIA<span>???</span></div>
        <div class="stat">TEBAKAN<span id="guess">-</span></div>
        <div class="stat">LANGKAH<span id="steps">0</span></div>
    </div>

    <div class="grid" id="grid"></div>

    <button id="btnPlay" onclick="autoSearch()">MULAI SIMULASI OTOMATIS</button>
    <p id="msg" style="margin-top: 20px; font-weight: bold; color: #555;"></p>
</div>

<script>
    const grid = document.getElementById('grid');
    let secretTarget = 0;

    // Inisialisasi 100 Angka
    function setup() {
        grid.innerHTML = '';
        for (let i = 1; i <= 100; i++) {
            const d = document.createElement('div');
            d.className = 'num';
            d.id = 'n-' + i;
            d.innerText = i;
            grid.appendChild(d);
        }
    }

    async function autoSearch() {
        setup();
        const btn = document.getElementById('btnPlay');
        btn.disabled = true;
        
        // 1. Komputer memilih angka rahasia (Hidden)
        secretTarget = Math.floor(Math.random() * 100) + 1;
        document.getElementById('msg').innerText = "Komputer sudah memilih angka rahasia. Memulai pencarian...";
        
        let low = 1;
        let high = 100;
        let stepCount = 0;

        // 2. Algoritma Divide & Conquer (Binary Search)
        while (low <= high) {
            stepCount++;
            document.getElementById('steps').innerText = stepCount;
            
            let mid = Math.floor((low + high) / 2);
            const currentEl = document.getElementById('n-' + mid);
            
            document.getElementById('guess').innerText = mid;
            currentEl.classList.add('active');

            await new Promise(r => setTimeout(r, 1200)); // Jeda agar siswa bisa melihat prosesnya

            if (mid === secretTarget) {
                currentEl.classList.remove('active');
                currentEl.classList.add('found');
                document.querySelector('.stat span').innerText = secretTarget;
                document.getElementById('msg').innerText = "SELESAI! Angka " + secretTarget + " ditemukan dalam " + stepCount + " langkah.";
                btn.disabled = false;
                return;
            }

            // Bagian Divide: Membuang area yang tidak mungkin
            if (mid < secretTarget) {
                document.getElementById('msg').innerText = mid + " terlalu kecil. Membuang angka 1 sampai " + mid;
                for (let i = low; i <= mid; i++) {
                    document.getElementById('n-' + i).classList.add('discarded');
                }
                low = mid + 1;
            } else {
                document.getElementById('msg').innerText = mid + " terlalu besar. Membuang angka " + mid + " sampai 100";
                for (let i = mid; i <= high; i++) {
                    document.getElementById('n-' + i).classList.add('discarded');
                }
                high = mid - 1;
            }

            currentEl.classList.remove('active');
            await new Promise(r => setTimeout(r, 600));
        }
    }

    setup();
</script>

</body>
</html>
