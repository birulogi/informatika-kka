<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Visual Maps Simulator - Greedy/Dijkstra</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; }
        canvas { border: 2px solid #ddd; border-radius: 10px; background-color: #fafafa; cursor: crosshair; }
        .controls { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-run { background: #1a73e8; color: white; }
        .btn-reset { background: #ea4335; color: white; }
        button:hover { opacity: 0.8; }
        #status { margin-top: 10px; color: #5f6368; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulasi Navigasi Jalur Terpendek</h2>
    <p>Mencari rute terbaik dari <b>Rumah (A)</b> ke <b>Sekolah (E)</b></p>
    
    <canvas id="mapCanvas" width="500" height="300"></canvas>

    <div class="controls">
        <button class="btn-run" onclick="startNavigation()">Mulai Navigasi</button>
        <button class="btn-reset" onclick="resetMap()">Reset</button>
    </div>
    
    <div id="status">Klik "Mulai Navigasi" untuk melihat rute.</div>
</div>

<script>
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');

    // Koordinat titik-titik (Simulasi Lokasi)
    const nodes = {
        'A': { x: 50, y: 150, name: 'Rumah (A)' },
        'B': { x: 200, y: 50, name: 'Taman (B)' },
        'C': { x: 200, y: 250, name: 'Pasar (C)' },
        'D': { x: 350, y: 150, name: 'SPBU (D)' },
        'E': { x: 450, y: 150, name: 'Sekolah (E)' }
    };

    // Koneksi antar titik dan jaraknya
    const edges = [
        { from: 'A', to: 'B', dist: 4 },
        { from: 'A', to: 'C', dist: 2 },
        { from: 'C', to: 'B', dist: 1 },
        { from: 'B', to: 'D', dist: 3 },
        { from: 'C', to: 'D', dist: 7 },
        { from: 'D', to: 'E', dist: 2 }
    ];

    function drawMap(highlightPath = []) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Gambar Jalan (Garis Abu-abu)
        edges.forEach(edge => {
            const start = nodes[edge.from];
            const end = nodes[edge.to];
            ctx.beginPath();
            ctx.moveTo(start.x, start.y);
            ctx.lineTo(end.x, end.y);
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Tampilkan jarak di tengah garis
            ctx.fillStyle = '#999';
            ctx.font = '12px Arial';
            ctx.fillText(edge.dist + " km", (start.x + end.x) / 2, (start.y + end.y) / 2 - 5);
        });

        // Gambar Jalur Navigasi (Warna Biru seperti Maps)
        if (highlightPath.length > 0) {
            ctx.beginPath();
            ctx.strokeStyle = '#4285F4';
            ctx.lineWidth = 6;
            ctx.lineJoin = 'round';
            ctx.moveTo(nodes[highlightPath[0]].x, nodes[highlightPath[0]].y);
            for (let i = 1; i < highlightPath.length; i++) {
                ctx.lineTo(nodes[highlightPath[i]].x, nodes[highlightPath[i]].y);
            }
            ctx.stroke();
        }

        // Gambar Titik Lokasi
        for (let key in nodes) {
            const node = nodes[key];
            ctx.beginPath();
            ctx.arc(node.x, node.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = (key === 'A' || key === 'E') ? '#ea4335' : '#1a73e8';
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.font = 'bold 12px Arial';
            ctx.fillText(node.name, node.x - 20, node.y - 15);
        }
    }

    function startNavigation() {
        // Jalur terpendek hasil perhitungan (A -> C -> B -> D -> E)
        // Total jarak: 2 + 1 + 3 + 2 = 8 km
        const bestPath = ['A', 'C', 'B', 'D', 'E'];
        let step = 0;

        statusText.innerText = "Mencari rute tercepat...";
        
        const interval = setInterval(() => {
            step++;
            drawMap(bestPath.slice(0, step));
            
            if (step >= bestPath.length) {
                clearInterval(interval);
                statusText.innerText = "Rute Ditemukan: A → C → B → D → E (Total 8 km)";
                statusText.style.color = "#34a853";
            }
        }, 600);
    }

    function resetMap() {
        drawMap();
        statusText.innerText = "Klik 'Mulai Navigasi' untuk melihat rute.";
        statusText.style.color = "#5f6368";
    }

    // Inisialisasi awal
    drawMap();
</script>

</body>
</html>
